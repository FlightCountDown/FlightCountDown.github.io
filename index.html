<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: url('road.gif') center center / cover no-repeat;
    }

    .corner-gif {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 120px;
      height: auto;
      z-index: 5;
      cursor: pointer;
    }

    .corner-gif2 {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 120px;
      height: auto;
      z-index: 5;
      cursor: pointer;
    }
    .container {
      padding: 20px;
      z-index: 10;
    }
    .music {
      padding: 20px;
      z-index: 11;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .time {
      font-size: 8vw;
      font-weight: bold;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .time.animate {
      transform: scale(1.1);
      opacity: 0.7;
    }

    #secretMessage {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      color: rgb(255, 0, 0);
      padding: 16px 22px;
      border-radius: 12px;
      font-size: 1.4rem;
      min-width: 200px;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 20;
      pointer-events: none;
      white-space: pre-wrap;
    }
    #secretMessage2 {
      position: absolute;
      top: 75%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      color: rgb(255, 0, 0);
      padding: 16px 22px;
      border-radius: 12px;
      font-size: 1.4rem;
      min-width: 200px;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 20;
      pointer-events: none;
      white-space: pre-wrap;
    }
    #secretMessage.show {
      opacity: 1;
    }
    #secretMessage2.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <img src="heartgif.gif" id="heart" class="corner-gif" />

  <img src="plane.gif" id = "plane" class="corner-gif2" />


  <div class="container">
    <h1>Days until I see you:</h1>
    <div id="countdown" class="time">--</div>
  </div>

  <div id="secretMessage"></div>
  <div id="secretMessage2"></div>

  <div class="music">
    <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/vKJhzL16woE?si=ZQZM77ilyD2lw0tz&amp;start=30" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>

 <script>
  function getBolognaTarget() {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/Chicago",
      year: "numeric",
      month: "numeric",
      day: "numeric",
      hour: "numeric",
      minute: "numeric",
      second: "numeric",
      hour12: false
    }).formatToParts(new Date("2026-04-01T15:50:00"));

    const lookup = {};
    for (const p of parts) lookup[p.type] = p.value;

    return new Date(
      Date.UTC(
        lookup.year,
        lookup.month - 1,
        lookup.day,
        lookup.hour,
        lookup.minute,
        lookup.second
      )
    );
  }

  const targetDate = getBolognaTarget();

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    const el = document.getElementById('countdown');
    el.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;

    el.classList.add('animate');
    setTimeout(() => el.classList.remove('animate'), 200);
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  
  const secretMessageText = "I miss you <3";
  const secretMessage2Text = "I love you Rose";
  const secretBox = document.getElementById("secretMessage");
  const secretBox2 = document.getElementById("secretMessage2");
  let isShowing = false;
  let isShowing2 = false;

  function typeMessage(text) {
    secretBox.textContent = "";
    let i = 0;
    const speed = 50;

    function typeNext() {
      if (i < text.length) {
        secretBox.textContent += text.charAt(i);
        i++;
        setTimeout(typeNext, speed);
      }
    }

    typeNext();
  }
  function typeMessage2(text) {
    secretBox2.textContent = "";
    let i = 0;
    const speed = 50;

    function typeNext() {
      if (i < text.length) {
        secretBox2.textContent += text.charAt(i);
        i++;
        setTimeout(typeNext, speed);
      }
    }

    typeNext();
  }

  document.getElementById('heart').addEventListener('click', () => {
    isShowing = !isShowing;

    if (isShowing) {
      secretBox.classList.add('show');
      typeMessage(secretMessageText);
    } 
    
    else {
      secretBox.classList.remove('show');
      secretBox.textContent = "";
    }

  });
  document.getElementById('plane').addEventListener('click', () => {
    isShowing2 = !isShowing2;

    if (isShowing2) {
      secretBox2.classList.add('show');
      typeMessage2(secretMessage2Text);
    } 
    
    else {
      secretBox2.classList.remove('show');
      secretBox2.textContent = "";
    }

  });
</script>


</body>
</html>
